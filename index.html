<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背单词</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Tab 切换栏 -->
    <nav class="tab-bar">
      <button id="tabLookup" class="tab-btn active">查单词</button>
      <button id="tabReview" class="tab-btn">背单词</button>
      <button id="btnLogin" class="login-btn" title="登录">👤</button>
    </nav>

    <!-- 查单词界面 -->
    <section id="panelLookup" class="tab-panel active">
      <h1 class="title">📖 查单词</h1>
      <p class="subtitle">查询单词，自动加入单词本</p>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="输入英文单词，按回车查询..."
          autofocus
        />
        <button id="searchBtn" class="search-btn">查询</button>
      </div>

      <div id="resultArea" class="result-area">
        <div class="placeholder">输入一个单词开始查询吧</div>
      </div>
    </section>

    <!-- 背单词界面 -->
    <section id="panelReview" class="tab-panel">
      <div id="flashcardArea" class="flashcard-area"></div>
    </section>

    <!-- Toast -->
    <div id="toast" class="toast hidden">
      <span id="toastMsg"></span>
      <button id="toastUndo" class="toast-undo">撤销</button>
    </div>

    <!-- 打开单词本按钮 -->
    <button id="openWordbookBtn" class="open-wordbook-btn" title="打开单词本">
      <span class="book-icon">📒</span>
      <span id="wordCount" class="word-count">0</span>
    </button>

    <!-- 单词本遮罩 -->
    <div id="overlay" class="overlay hidden"></div>

    <!-- 单词本侧边栏 -->
    <aside id="wordbook" class="wordbook">
      <div class="wordbook-resize-handle" id="wordbookResizeHandle"></div>
      <div class="wordbook-header">
        <h2>我的单词本</h2>
        <button id="closeWordbookBtn" class="close-btn">✕</button>
      </div>

      <div class="wordbook-actions">
        <button id="clearAllBtn" class="clear-all-btn">清空全部</button>
      </div>

      <div id="wordbookList" class="wordbook-list">
        <div class="empty-state">暂无单词，去查询一个吧</div>
      </div>
    </aside>

    <!-- 登录弹窗 -->
    <div id="authModal" class="auth-modal hidden">
      <div class="auth-card">
        <button id="closeAuthBtn" class="close-btn auth-close">✕</button>
        <div class="auth-tabs">
          <button id="authTabLogin" class="auth-tab active">登录</button>
          <button id="authTabReg" class="auth-tab">注册</button>
        </div>
        <div id="authError" class="auth-error hidden"></div>
        <form id="authForm">
          <input type="text" id="authUsername" class="auth-input" placeholder="用户名" autocomplete="username" maxlength="20" />
          <input type="password" id="authPassword" class="auth-input" placeholder="密码" autocomplete="current-password" maxlength="50" />
          <button type="submit" id="authSubmit" class="auth-submit">登录</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
